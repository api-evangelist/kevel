apis:
  - aid: kevel:decision-api
    name: Kevel Decision API
    description: >-
      The Decision API enables ad requests without using ad code. By posting
      to a RESTful endpoint, Kevel's ad engine returns decision data and
      creative contents for serving ads in your application.
    humanURL: https://dev.kevel.com/reference/request
    tags:
      - Ad Serving
      - Decision
    properties:
      - type: Documentation
        url: https://dev.kevel.com/docs/native-ads-api-quickstart
      - type: Reference
        url: https://dev.kevel.com/reference/getting-started-with-kevel
  - aid: kevel:management-api
    name: Kevel Management API
    description: >-
      The Management API provides programmatic access to manage campaigns,
      flights, ads, and other platform resources.
    humanURL: https://dev.kevel.com/docs/management-api-tutorial
    tags:
      - Campaigns
      - Management
    properties:
      - type: Documentation
        url: https://dev.kevel.com/docs/management-api-tutorial
