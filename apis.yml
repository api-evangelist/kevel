aid: kevel
name: Kevel
description: >-
  Kevel is a set of APIs that allows customers to build a unified ad platform
  supporting any ad format, any creative, and management of multiple demand
  sources. It provides Decision API, Management API, and Reporting API for
  building custom ad serving infrastructure.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
